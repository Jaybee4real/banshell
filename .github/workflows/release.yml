name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build universal app
        run: bash macos/build.sh
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: macos/build/Banshell-macOS.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Publish self-contained build
        run: dotnet publish windows/Banshell.csproj -c Release -r win-x64 --self-contained -o windows/publish
      - name: Zip
        run: Compress-Archive -Path windows/publish/* -DestinationPath Banshell-Windows.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Banshell-Windows.zip
